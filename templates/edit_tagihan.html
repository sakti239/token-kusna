{% extends "admin_layout.html" %} {% block content %}

<div class="form-card">
  <div class="page-header">
    <div>
      <h2>Edit Tagihan</h2>
      <p>Perbarui data tagihan pelanggan</p>
    </div>

    <a href="/admin/tagihan" class="btn-kembali">
      <i class="bi bi-arrow-left"></i>
      Kembali
    </a>
  </div>

  <form method="POST">
    <div class="mb-3">
      <label>Bulan</label>
      <input
        type="text"
        name="bulan"
        class="form-control"
        value="{{ tagihan.bulan }}"
        required
      />
    </div>

    <div class="mb-3">
      <label>Tahun</label>
      <input
        type="number"
        name="tahun"
        class="form-control"
        value="{{ tagihan.tahun }}"
        required
      />
    </div>

    <div class="mb-3">
      <label>Tagihan PLN</label>
      <input
        type="number"
        name="tagihan_pln"
        class="form-control"
        value="{{ tagihan.tagihan_pln }}"
        required
      />
    </div>

    <div class="mb-3">
      <label>Biaya Admin</label>
      <input
        type="number"
        name="admin"
        class="form-control"
        value="{{ tagihan.admin }}"
        required
      />
    </div>

    <button type="submit" class="btn-simpan">Simpan Perubahan</button>
  </form>
</div>

{% endblock %}
