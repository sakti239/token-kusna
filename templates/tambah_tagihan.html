{% extends "admin_layout.html" %} {% block content %}

<div class="form-card">
  <div class="form-header">
    <div>
      <h2>Tambah Tagihan</h2>
      <p>Buat tagihan baru pelanggan</p>
    </div>

    <a href="/admin/tagihan" class="btn-kembali"> Kembali </a>
  </div>

  <form method="POST">
    <div class="form-group">
      <label>Pelanggan</label>

      <select name="pelanggan_id" required>
        {% for p in pelanggan %}

        <option value="{{ p.id }}">{{ p.nama }}</option>

        {% endfor %}
      </select>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label>Bulan</label>

          <select name="bulan" required>
            <option>Januari</option>
            <option>Februari</option>
            <option>Maret</option>
            <option>April</option>
            <option>Mei</option>
            <option>Juni</option>
            <option>Juli</option>
            <option>Agustus</option>
            <option>September</option>
            <option>Oktober</option>
            <option>November</option>
            <option>Desember</option>
          </select>
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label>Tahun</label>

          <input type="number" name="tahun" value="2026" required />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Tagihan PLN</label>

      <input type="number" name="tagihan_pln" required />
    </div>

    <div class="form-group">
      <label>Biaya Admin</label>

      <input type="number" name="admin" value="2000" required />
    </div>

    <button type="submit" class="btn-simpan">Simpan Tagihan</button>
  </form>
</div>

{% endblock %}
