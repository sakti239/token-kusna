<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kusna Token Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <style></style>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/admin.css') }}"
    />
  </head>
  <body>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
      <div class="logo">KUSNA TOKEN</div>

      <ul class="sidebar-menu">
        <li>
          <a
            href="/admin"
            class="{% if active_page == 'dashboard' %}active{% endif %}"
          >
            <i class="bi bi-grid-fill"></i>
            Dashboard
          </a>
        </li>

        <li>
          <a
            href="/admin/pelanggan"
            class="{% if active_page == 'pelanggan' %}active{% endif %}"
          >
            <i class="bi bi-people-fill"></i>
            Pelanggan
          </a>
        </li>

        <li>
          <a
            href="/admin/tagihan"
            class="{% if active_page == 'tagihan' %}active{% endif %}"
          >
            <i class="bi bi-receipt"></i>
            Tagihan
          </a>
        </li>

        <li>
          <a
            href="/admin/keuangan"
            class="{% if active_page == 'keuangan' %}active{% endif %}"
          >
            <i class="bi bi-wallet2"></i>
            Keuangan
          </a>
        </li>

        <li>
          <a href="/logout">
            <i class="bi bi-box-arrow-right"></i>
            Logout
          </a>
        </li>
      </ul>
    </div>

    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>

      <span class="topbar-title"> Kusna Token Admin </span>
    </div>

    <div class="content">{% block content %} {% endblock %}</div>
    <script>
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("show");

        document.querySelector(".sidebar-overlay").classList.toggle("show");
      }
    </script>
  </body>
</html>
