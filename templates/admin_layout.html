<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kusna Token Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f7fe;
        margin: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* --- Sidebar Desktop --- */
      .sidebar {
        width: 260px;
        height: 100vh;
        background: #1565c0;
        position: fixed;
        left: 0;
        top: 0;
        overflow-y: auto;
        transition: all 0.3s ease;
        z-index: 1040;
        box-shadow: 4px 0 10px rgba(0, 0, 0, 0.05);
      }

      .logo {
        padding: 20px;
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        color: white;
        letter-spacing: 1px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .menu {
        padding: 20px 15px;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 75px);
      }

      .menu a {
        display: flex;
        align-items: center;
        gap: 12px;
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        padding: 12px 15px;
        margin-bottom: 8px;
        border-radius: 10px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .menu a i {
        font-size: 1.2rem;
      }

      .menu a:hover,
      .menu a.active {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }

      .logout {
        margin-top: auto;
        background: rgba(220, 53, 69, 0.1);
        color: #ff8d94 !important;
      }

      .logout:hover {
        background: #dc3545 !important;
        color: white !important;
      }

      /* --- Topbar Desktop --- */
      .topbar {
        position: fixed;
        top: 0;
        left: 260px;
        right: 0;
        height: 70px;
        background: white;
        display: flex;
        align-items: center;
        padding: 0 30px;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04);
        z-index: 1030;
        transition: all 0.3s ease;
      }

      .menu-btn {
        border: none;
        background: #f1f3f9;
        color: #333;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        margin-right: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }

      .menu-btn:hover {
        background: #1565c0;
        color: white;
      }

      .topbar-title {
        font-weight: 600;
        color: #333;
        font-size: 1.1rem;
      }

      /* --- Main Content Desktop --- */
      .content {
        margin-left: 260px;
        margin-top: 70px;
        padding: 30px;
        transition: all 0.3s ease;
      }

      /* Toggle Class untuk Desktop (jika nanti ingin ditambahkan fitur minimize sidebar) */
      .sidebar.hide {
        left: -260px;
      }
      .topbar.full {
        left: 0;
      }
      .content.full {
        margin-left: 0;
      }

      /* --- Overlay Mobile --- */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(3px);
        z-index: 1035;
        transition: opacity 0.3s ease;
      }

      /* --- Responsive Mobile (Breakpoint: 992px ke bawah) --- */
      @media (max-width: 991.98px) {
        .sidebar {
          left: -260px;
        }

        .sidebar.show {
          left: 0;
        }

        .topbar {
          left: 0;
          padding: 0 20px;
        }

        .content {
          margin-left: 0;
          padding: 20px;
        }

        .overlay.show {
          display: block;
        }
      }
      .card {
        border: none;
        border-radius: 18px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-4px);
      }

      .btn {
        border-radius: 10px;
      }
    </style>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/admin.css') }}"
    />
  </head>

  <body>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar">
      <div class="logo">KUSNA TOKEN</div>

      <ul class="sidebar-menu">
        <li>
          <a
            href="/admin"
            class="{% if active_page == 'dashboard' %}active{% endif %}"
          >
            <i class="bi bi-grid-fill"></i>
            Dashboard
          </a>
        </li>

        <li>
          <a
            href="/admin/pelanggan"
            class="{% if active_page == 'pelanggan' %}active{% endif %}"
          >
            <i class="bi bi-people-fill"></i>
            Pelanggan
          </a>
        </li>

        <li>
          <a
            href="/admin/tagihan"
            class="{% if active_page == 'tagihan' %}active{% endif %}"
          >
            <i class="bi bi-receipt"></i>
            Tagihan
          </a>
        </li>

        <li>
          <a
            href="/admin/keuangan"
            class="{% if active_page == 'keuangan' %}active{% endif %}"
          >
            <i class="bi bi-wallet2"></i>
            Keuangan
          </a>
        </li>

        <li>
          <a href="/logout">
            <i class="bi bi-box-arrow-right"></i>
            Logout
          </a>
        </li>
      </ul>
    </div>

    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <i class="bi bi-list fs-4"></i>
      </button>
      <span class="topbar-title">Kusna Token Admin</span>
    </div>

    <div class="content">{% block content %} {% endblock %}</div>

    <script>
      function toggleSidebar() {
        // Toggle class 'show' di sidebar dan overlay agar memunculkan menu di mobile
        document.querySelector(".sidebar").classList.toggle("show");
        document.querySelector(".overlay").classList.toggle("show");
      }
    </script>
  </body>
</html>
